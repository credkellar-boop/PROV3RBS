<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="{{ locale.meta_description }}">
    <title>{{ locale.app_name }}</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.js"></script>
</head>
<body>
    <h1>{{ locale.app_name }}</h1>
    <h2>{{ locale.welcome_msg }}</h2>
    
    <div id="container">
        <div id="video-container">
            <h3>Study Room</h3>
            <div id="remote-video"></div>
            <button id="join-room">Join Video</button>
        </div>
        
        <div id="chat-container">
            <h3>Scholar Chat</h3>
            <div id="chat-box"></div>
            <input type="text" id="message-input" placeholder="Share your thoughts...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
